name: CI/CD - BE2 Deploy to Render

on:
  push:
    [cite_start]
    branches: [main]           # Deploy khi merge vào main [cite: 1]
    paths:
      - [cite_start]"BE2/**"               # Chỉ trigger khi có thay đổi trong folder BE2 [cite: 1]
  pull_request:
    branches: [main]
    paths:
      - [cite_start]"BE2/**"               # Chỉ chạy CI khi PR có thay đổi trong BE2 [cite: 1, 2]

jobs:
  # ─── JOB 1: Build & Test ────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.jsa
        uses: actions/setup-node@v4
        with:
          node-version: "20.x" # Sử dụng Node.js bản LTS mới nhất

      - name: Install dependencies
        working-directory: BE2
        run: npm install

      # Bỏ comment phần dưới này nếu dự án Node.js của bạn có bước build (ví dụ dùng Babel hoặc TypeScript)
      # - name: Build
      #   working-directory: BE2
      #   run: npm run build

      # Bỏ comment nếu bạn có viết Unit Test bằng Jest/Mocha
      # - name: Run Tests
      #   working-directory: BE2
      #   run: npm test

  # ─── JOB 2: Deploy lên Render ───────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    [cite_start]needs: build                            # Chỉ deploy khi build thành công [cite: 4]
    [cite_start]if: github.ref == 'refs/heads/main'     # Chỉ deploy khi push/merge vào main [cite: 4]

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "HTTP Status: $HTTP_CODE" [cite: 5]
          cat response.json

          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then
            [cite_start]echo "❌ Deploy thất bại! HTTP status: $HTTP_CODE" [cite: 6]
            [cite_start]exit 1 [cite: 6]
          fi
          [cite_start]echo "✅ Deploy trigger thành công!" [cite: 6]